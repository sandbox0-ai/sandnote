name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    uses: ./.github/workflows/package.yml
    with:
      version: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.sha) }}

  release:
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sandnote-${{ github.ref_name }}-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
